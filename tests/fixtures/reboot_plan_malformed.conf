# Each line below tests one rejection. Only one line (the good one) is accepted.
DC-A 10.0.0                                 # bad IPv4 (only 3 octets)
DC-A 10.0.0.1; rm -rf /                     # shell-meta in IP token (parsed as 3 tokens)
DC-A$(id) 10.0.0.2                          # injection in DC label
DC-A 10.0.0.3 extra-token                   # malformed (3 tokens)
DC-A                                        # malformed (single token)
10.0.0.4                                    # single-token: parsed as bad label
DC-A 10.0.0.5                               # OK — accepted
DC-A 10.0.0.5                               # duplicate IP — rejected
DC-A `whoami`                               # backtick in IP token — bad IPv4
