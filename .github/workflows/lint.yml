name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ludeeus/action-shellcheck annotates findings line-by-line in the
      # GitHub UI, so failures are visible without downloading raw logs.
      # Exclusions:
      #   SC1091 — sourced libs not on disk at lint time (REPO_ROOT layout)
      #   SC2155 — `local x=$(cmd)` style; we guard with `|| true` instead
      #   SC2034 — vars exposed by lib/ for downstream automations
      #   SC2086 — a few intentional word-splits (parser hosts loop) are
      #            already validated against a strict regex
      #   SC2317 — defensive `:` arms in case statements
      - name: shellcheck
        uses: ludeeus/action-shellcheck@2.0.0
        env:
          SHELLCHECK_OPTS: -x -e SC1091,SC2155,SC2034,SC2086,SC2317
        with:
          severity: warning
          scandir: '.'
          additional_files: ''
          ignore_paths: '.git'

  bats:
    name: Bats tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bats
        run: |
          sudo apt-get update
          sudo apt-get install -y bats

      - name: Run bats tests
        run: |
          if [ -d tests ]; then
            bats tests/
          else
            echo "No tests/ directory — skipping."
          fi
