name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run shellcheck on all .sh files
        run: |
          # Exclusions explained:
          #   SC1091 — sourced libs aren't on disk at lint time (REPO_ROOT path)
          #   SC2155 — `local x=$(cmd)` style; we use `|| true` and other
          #            guards instead of relying on the return code
          #   SC2034 — vars defined in lib for downstream automations
          #   SC2086 — word-splitting is intentional in a couple of places
          #            (e.g. `for item in ${val//,/ }`); the parser also
          #            validates each item against a strict regex
          #   SC2317 — defensive `:` in case arms — flagged as unreachable
          find . -type f -name '*.sh' -not -path './.git/*' -print0 \
            | xargs -0 shellcheck -x -e SC1091,SC2155,SC2034,SC2086,SC2317 \
            --severity=warning

  bats:
    name: Bats tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bats
        run: |
          sudo apt-get update
          sudo apt-get install -y bats

      - name: Run bats tests
        run: |
          if [ -d tests ]; then
            bats tests/
          else
            echo "No tests/ directory — skipping."
          fi
